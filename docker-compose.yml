version: '3.8'
name: master_thesis_graphs_hypergraphs

services:
  api:
    container_name: graph-api
    build: ./graph-api
    ports:
      - "8000:8000"
    volumes:
      - ./graph-api:/code
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
      container_name: graph-frontend
      image: node:20-alpine
      working_dir: /app
      ports:
        - "4200:4200"
      volumes:
        - ./graph-app-frontend:/app
        - /app/node_modules
      command: sh -c "npm install && npx -p @angular/cli ng serve --host 0.0.0.0 --poll 2000"
      environment:
        - CHOKIDAR_USEPOLLING=true