<div class="container">
  <h2>Pobieranie Grafów i Hipergrafu z tekstu</h2>
  
  <button matButton="filled" (click)="fetchData()" [disabled]="isLoading()">
   {{ isLoading() ? 'Pobieranie...' : 'Pobierz dane strukturalne wygenerowane przez LLM' }}
  </button>

  <p *ngIf="errorMessage()" style="color: red; margin-top: 15px;">{{ errorMessage() }}</p>

  <div *ngIf="jsonData()" class="data-wrapper">
    <h3>Wizualizacje pobrane z API pomyślnie!</h3>
    <!-- <pre>{{ jsonData() | json }}</pre> -->
    <h4>Graf wiedzy wyekstrachowany z tekstu przez LLM:</h4>
    <img *ngIf="imageUrl()" [src]="imageUrl()" alt="Wygenerowany graf" style="max-width: 100%; height: auto; margin-top: 20px;">
  </div>
</div>
